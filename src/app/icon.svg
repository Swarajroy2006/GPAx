<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant gradient representing academic growth -->
    <linearGradient id="gpaXGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Emerald Green -->
    </linearGradient>
  </defs>

  <!-- Background Layer (Optional: Remove if you want a transparent favicon) -->
  <rect width="512" height="512" rx="112" fill="#0F172A"/>

  <!-- The GPA-X Icon Core -->
  <g transform="translate(56, 56)">
    <!-- Descending sash line -->
    <rect x="72" y="120" width="256" height="64" rx="32" transform="rotate(45 200 152)" fill="#E2E8F0"/>
    
    <!-- Ascending growth arrow / percentage bar -->
    <rect x="72" y="120" width="256" height="64" rx="32" transform="rotate(-45 200 152)" fill="url(#gpaXGradient)"/>
    
    <!-- Academic Cap Accent Dot at the peak of growth -->
    <circle cx="290" cy="110" r="24" fill="#10B981" />
  </g>
</svg>
